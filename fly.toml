# Deploy: fly deploy (from this repo root)
# First time: fly launch --no-deploy --name resuma-docs

app = 'resuma-docs'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = 'rolling'

[env]
  HOST = '0.0.0.0'
  PORT = '3000'
  RESUMA_PAGES_ROOT = '/app/pages'
  SITE_URL = 'https://resuma-docs.fly.dev'
  RESUMA_ENV = 'production'
  RESUMA_TRUST_PROXY = '1'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '20s'
    interval = '15s'
    method = 'get'
    timeout = '5s'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
