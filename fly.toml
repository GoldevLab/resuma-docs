# Deploy: fly deploy (from this repo root)
# First time: fly launch --no-deploy --name resuma-docs

app = 'resuma-docs'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = 'rolling'

[env]
  HOST = '0.0.0.0'
  PORT = '3000'
  RESUMA_PAGES_ROOT = '/app/pages'
  RESUMA_DATA_DIR = '/app/.resuma'
  SITE_URL = 'https://resuma-docs.fly.dev'
  RESUMA_ENV = 'production'
  RESUMA_TRUST_PROXY = '1'
  # Fly edge proxies use the fdaa::/16 private network — required by resuma 1.2+.
  RESUMA_TRUSTED_PROXY_CIDRS = 'fdaa::/16'
  RESUMA_RATE_EXEC_GRAPH = '600'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  # Resuma OS demos need a single machine (graph state is local disk + in-memory).
  # Remove extra machines: fly scale count 1 -a resuma-docs
  processes = ['app']

  [[http_service.checks]]
    grace_period = '20s'
    interval = '15s'
    method = 'get'
    timeout = '5s'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

# Graph tokens + durable state survive restarts (create once: fly volumes create resuma_docs_data -r iad)
[mounts]
  source = 'resuma_docs_data'
  destination = '/app/.resuma'
